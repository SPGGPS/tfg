project: "Inventario Centralizado"
version: "2.0.0"
status: "released"
release_date: "2026-03-22"
last_updated: "2026-03-24"

# Rutas relativas desde la raíz del proyecto TFG (tfg/)
paths:
  changes: "openspec/changes"
  archive: "openspec/changes/archive"

engine:
  specification_mode: spec-driven
  auto_archive: false

# ─── Contexto global del proyecto ────────────────────────────────────────────
context: |
  Nombre: Inventario Centralizado — Ayuntamiento de San Sebastián de los Reyes
  TFG de gestión CMDB para activos TI municipales.

  Stack:
    Frontend: React 18 + Vite 5, Tailwind CSS v3, TanStack Query v5, React Router v6
    Backend:  FastAPI + Python 3.11, SQLAlchemy v2, Pydantic v2, PostgreSQL 16
    Auth:     Keycloak OIDC+PKCE (saltable con SKIP_AUTH=true en dev)
    Infra:    Docker Compose (dev) / k3s + Helm (producción)
              Traefik ingress, Cilium CNI + NetworkPolicy
              Namespace: inventory-ssreyes

  Arranque local (Docker Compose):
    docker compose down -v
    docker compose build --no-cache
    docker compose up -d
    Frontend: http://localhost:5173  |  API docs: http://localhost:8000/docs
    PostgreSQL: localhost:5433 (puerto externo para evitar conflicto con Postgres local)

  Roles RBAC:
    admin  → acceso total: excepciones, auditoría, etiquetas, localizaciones, fuentes de datos
    editor → lee todo + edita activos, aplicaciones, etiquetas
    viewer → solo lectura

  Tipos de activo (AssetType):
    server_physical, server_virtual, vcenter
    web_server, database
    switch, router, firewall, load_balancer, ap
    storage_array
    k8s_cluster, container

  Branding:
    Color primario: #C8001D (rojo corporativo Ayuntamiento SSReyes)
    Tema: claro. Body: #FDF7F7. Cards: #FFFFFF borde #EED8D8
    Sidebar: degradado #A8001A → #C8001D. Logo blanco (filter: brightness(0) invert(1))
    IMPORTANTE: los colores de compliance son semánticos y NO deben cambiarse con el branding

  Ingesta externa (fuentes de datos):
    VMware vCenter, Veeam Backup, EDR (CrowdStrike/SentinelOne), Monica (Assets),
    Monitorización (Zabbix/Nagios), entrada manual

  Compliance (indicadores auditados por activo):
    EDR instalado, Monitorizado, SIEM habilitado, Logs habilitados,
    Backup local reciente, Backup cloud reciente, Registrado en Monica

# ─── Reglas por artefacto ────────────────────────────────────────────────────
rules:
  openapi_spec:
    - Seguir OpenAPI 3.1.0 con 'securitySchemes' tipo 'openIdConnect' (Keycloak URL).
    - Modelos Asset incluir campos de auditoría (edr_installed, monitored, siem_enabled, etc.).
    - Anotación 'x-required-roles' en cada path (admin, editor, viewer).
    - Validación con 'pattern', 'format' y 'maxLength' en todos los inputs de usuario.
    - Rutas específicas ANTES que rutas con parámetros en FastAPI
      (ej: /reason-codes/list antes de /{id}).

  backend_code:
    - Autorización: middleware valida firma RS256 (JWKS) y extrae roles de
      resource_access.{CLIENT_ID}.roles y realm_access.roles del JWT.
    - SKIP_AUTH=true inyecta usuario simulado: {sub:"dev-user", roles:["admin"]}.
    - Enums en to_dict() siempre como string plano:
        str(self.field).split(".")[-1] if self.field else None
    - IntegrityError de PostgreSQL → capturar y devolver HTTP 409, nunca 500.
      Rollback obligatorio antes de relanzar.
    - ORM obligatorio para todas las queries (sin SQL literal, evita SQLi).
    - Auto-migración de columnas nuevas vía _auto_migrate() en init_db.py
      (no se usa Alembic — ALTER TABLE ADD COLUMN IF NOT EXISTS).
    - Historificación: AssetHistory snapshot por asset, retención 1 año.
    - Tagging automático: apply_auto_tags() + apply_eol_tags() tras cualquier
      cambio de asset.
    - Secure Headers: X-Content-Type-Options, X-Frame-Options, HSTS, CSP
      en todas las respuestas HTTP.
    - Rate limiting en endpoints de login/token refresh (HTTP 429).

  frontend_code:
    - TanStack Query v5: siempre envolver mutate en arrow function:
        onSubmit={d => mut.mutate(d)}  — nunca  onSubmit={mut.mutate}
    - Hooks siempre en nivel superior del componente, nunca dentro de
      objetos, arrays ni condicionales.
    - invalidateQueries con exact:false para invalidar todas las variantes
      de una queryKey.
    - Tabs activos: border-red-600 text-red-700 font-semibold.
      Tabs inactivos: text-gray-500.
    - Badges: bg-X-100 text-X-800 border border-X-400/500 font-semibold.
      Nunca dark-mode en tema claro.
    - RBAC visual: ocultar/deshabilitar acciones según rol del usuario.
    - Skeletons y manejo de errores que no revelen detalles internos.

  k8s_manifests:
    - Chart único 'inventario-centralizado'. Namespace fijo 'inventory-ssreyes'
      en todos los resources.
    - Traefik como Ingress Controller (nativo k3s).
    - Cilium CNI + NetworkPolicies. Política base deny-all por namespace,
      allows explícitos por puerto y etiqueta (ambos lados egress+ingress).
    - Puertos declarados en NetworkPolicies y containerPort:
        frontend  → 80 (Traefik → Service → Pod)
        backend   → 8000
        postgres  → 5432 (solo desde backend y CronJobs)
        keycloak  → 8080 (solo desde backend para JWKS)
    - Secrets: 'inventario-secrets' con DATABASE_URL. ConfigMap: 'inventario-config'
      con KEYCLOAK_URL, CORS_ORIGINS, SKIP_AUTH.
    - Non-root: runAsNonRoot=true, runAsUser=1001 en todos los contenedores.
    - PVC 'avatars-pvc' montado en backend en /tmp/avatars.
    - CronJobs en inventory-ssreyes: snapshot horario, purge-audit (180d),
      purge-history (365d), expire-exceptions (diario), eol-sync (03:00 UTC).

  docker:
    - Siempre usar --no-cache en builds: docker compose build --no-cache
    - Puerto externo PostgreSQL: 5433 (no 5432, para evitar conflicto local)
    - VITE_SKIP_AUTH es build-time arg — requiere rebuild al cambiar.

  tasks:
    - Dividir en bloques de máximo 4h.
    - Priorizar diseño de BD y lógica de negocio antes que la estética.
    - Configurar mappers de roles en Keycloak como paso crítico inicial.
    - Marcar tareas como [x] en tasks.md al completarlas.
