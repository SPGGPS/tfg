project: "Inventario Centralizado"
version: "2.0.0"
last_updated: "2026-03-22"

paths:
  changes: "openspec/changes-v2"
  archive: "openspec/changes/archive"

engine:
  specification_mode: spec-driven
  auto_archive: false

# ─── Contexto global del proyecto ────────────────────────────────────────────
context: |
  Nombre: Inventario Centralizado — Ayuntamiento de San Sebastián de los Reyes
  Repositorio: tfg4/

  Stack:
    Frontend: React 18 + Vite 5, Tailwind CSS v3, TanStack Query v5, React Router v6
    Backend:  FastAPI + Python 3.11, SQLAlchemy v2, Pydantic v2, PostgreSQL 16
    Auth:     Keycloak OIDC+PKCE (saltable con SKIP_AUTH=true en dev)
    Infra:    Docker Compose (dev) / k3s + Helm (producción)
              Traefik ingress, Cilium CNI + NetworkPolicy
              Namespace: inventory-ssreyes

  Arranque local:
    docker compose down -v
    docker compose build --no-cache
    docker compose up -d
    Frontend: http://localhost:5173 | API docs: http://localhost:8000/docs
    PostgreSQL: localhost:5433 (puerto externo 5433 para evitar conflicto con Postgres local)

  Roles RBAC:
    admin  → acceso total: excepciones, auditoría, etiquetas, localizaciones, fuentes de datos
    editor → lee todo + edita activos, aplicaciones, etiquetas
    viewer → solo lectura

  Branding:
    Color primario: #C8001D (rojo corporativo Ayuntamiento SSReyes)
    Tema: claro. Body: #FDF7F7. Cards: #FFFFFF borde #EED8D8
    Sidebar: degradado #A8001A → #C8001D. Logo blanco (filter: brightness(0) invert(1))
    IMPORTANTE: los colores de compliance son semánticos y NO deben cambiarse con el branding

rules:
  backend_code:
    - Todos los enums en to_dict() deben serializar como string plano:
        str(self.enum_field).split(".")[-1] if self.enum_field else None
    - Rutas específicas antes de rutas con parámetros en FastAPI (ej /reason-codes/list antes de /{id})
    - IntegrityError de PostgreSQL debe capturarse y devolver HTTP 409, nunca dejar pasar 500
    - Rollback obligatorio tras IntegrityError antes de relanzar excepción
    - SKIP_AUTH=true inyecta: {"sub":"dev-user","name":"Dev Admin","roles":["admin"]}

  frontend_code:
    - TanStack Query v5: SIEMPRE envolver mutate en arrow function: onSubmit={d => mut.mutate(d)}
    - Hooks SIEMPRE en nivel superior del componente, nunca dentro de objetos/arrays/condicionales
    - invalidateQueries con exact:false para invalidar todas las variantes
    - Tabs activos: border-red-600 text-red-700 font-semibold. Inactivos: text-gray-500
    - Clase .table-row-alt en cada <tr> de tabla para filas alternas

  docker:
    - SIEMPRE usar --no-cache en builds: docker compose build --no-cache
    - Puerto externo PostgreSQL: 5433 (no 5432)

# Estado del proyecto
version: "1.0.0"
status: "released"
release_date: "2026-03-22"
