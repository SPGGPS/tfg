apiVersion: v1
kind: ConfigMap
metadata:
  name: tfg-config
  namespace: tfg
data:
  # Configuración de retención de logs (días)
  LOG_RETENTION_DAYS: "30"
  # Configuración de sincronización horaria
  SYNC_INTERVAL_MINUTES: "60"
  # Configuración de Keycloak
  KEYCLOAK_URL: "http://keycloak.tfg.svc.cluster.local:8080"
  KEYCLOAK_REALM: "tfg"
  KEYCLOAK_AUDIENCE: "tfg-backend"